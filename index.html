<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deva Event & Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #000, #222);
            color: white;
            text-align: center;
        }

        header {
            background: black;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        h2 {
            margin-top: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid white;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        footer {
            background: black;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    Deva Event & Management
</header>

<h2>Our Special Effects</h2>

<div class="gallery">
    <img src="coldfire.jpg">
    <img src="dryice.jpg">
    <img src="fanwheel.jpg">
    <img src="paper.jpg">
</div>

<footer>

</footer>

</body>
</html>
